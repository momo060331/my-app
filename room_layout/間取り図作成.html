// ===== 設定チェックボックス =====
document.getElementById('overlapHighlight').addEventListener('change',e=>{ state.overlapHighlight=e.target.checked; draw(); });
document.getElementById('overlapWarning').addEventListener('change',e=>{ state.overlapWarning=e.target.checked; });
document.getElementById('overlapTransparent').addEventListener('change',e=>{ state.overlapTransparent=e.target.checked; draw(); });

document.getElementById('wallThickness').addEventListener('input',e=>{ state.wallThickness=parseInt(e.target.value); });
document.getElementById('gridSize').addEventListener('input',e=>{ state.gridSize=parseInt(e.target.value); draw(); });
document.getElementById('toggleGrid').addEventListener('click',()=>{
    state.showGrid=!state.showGrid;
    document.getElementById('toggleGrid').textContent='📏 グリッド: '+(state.showGrid?'ON':'OFF'); draw();
});
document.getElementById('toggleTatamiGrid').addEventListener('click',()=>{
    state.showTatamiGrid=!state.showTatamiGrid;
    document.getElementById('toggleTatamiGrid').textContent='🟧 1畳グリッド: '+(state.showTatamiGrid?'ON':'OFF'); draw();
});
document.getElementById('zoomIn').addEventListener('click',()=>{ state.zoomLevel=Math.min(state.zoomLevel+0.1,3.0); draw(); });
document.getElementById('zoomOut').addEventListener('click',()=>{ state.zoomLevel=Math.max(state.zoomLevel-0.1,0.3); draw(); });
document.getElementById('zoomReset').addEventListener('click',()=>{ state.zoomLevel=1.0; draw(); });
document.getElementById('resetPan').addEventListener('click',()=>{ state.panOffset={x:0,y:0}; state.zoomLevel=1.5; draw(); });

document.getElementById('rotateBtn').addEventListener('click',()=>{
    if(!state.selectedItem&&state.multiSelectedRooms.length===0) return;
    if(state.multiSelectedRooms.length>0){
        const av=[]; state.multiSelectedRooms.forEach(id=>{const r=state.rooms.find(rm=>rm.id===id);if(r)r.vertices.forEach(v=>av.push(v));});
        const cx=av.reduce((s,v)=>s+v.x,0)/av.length,cy=av.reduce((s,v)=>s+v.y,0)/av.length;
        state.multiSelectedRooms.forEach(id=>{const r=state.rooms.find(rm=>rm.id===id);if(r)r.vertices=r.vertices.map(v=>{const dx=v.x-cx,dy=v.y-cy;return{x:cx-dy,y:cy+dx};});});
    } else if(state.selectedItem){
        if(state.selectedItem.type==='room'){
            const c=getPolygonCenter(state.selectedItem.vertices);
            state.selectedItem.vertices=state.selectedItem.vertices.map(v=>{const dx=v.x-c.x,dy=v.y-c.y;return{x:c.x-dy,y:c.y+dx};});
        } else if(state.selectedItem.rotation!==undefined){ state.selectedItem.rotation=(state.selectedItem.rotation+90)%360; }
    }
    detectAllOverlaps(); updateOverlapBadge(); saveHistory(); draw();
});

document.getElementById('deleteBtn').addEventListener('click',()=>{
    if(!state.selectedItem) return;
    if(state.selectedItem.type==='room'){state.rooms=state.rooms.filter(r=>r.id!==state.selectedItem.id);state.dimensions=state.dimensions.filter(d=>d.roomId!==state.selectedItem.id);}
    else if(state.selectedItem.type==='wall')state.walls=state.walls.filter(w=>w.id!==state.selectedItem.id);
    else if(state.selectedItem.type==='door')state.doors=state.doors.filter(d=>d.id!==state.selectedItem.id);
    else if(state.selectedItem.type==='window')state.windows=state.windows.filter(w=>w.id!==state.selectedItem.id);
    else if(state.selectedItem.type==='manikin')state.manikins=state.manikins.filter(m=>m.id!==state.selectedItem.id);
    else if(state.selectedItem.type==='dimension')state.dimensions=state.dimensions.filter(d=>d.id!==state.selectedItem.id);
    state.selectedItem=null; state.selectedVertex=null; state.selectedEdge=null;
    detectAllOverlaps(); updateOverlapBadge(); saveHistory(); draw();
});

document.getElementById('saveBtn').addEventListener('click',()=>{
    const data={rooms:state.rooms,groups:state.groups,walls:state.walls,doors:state.doors,windows:state.windows,manikins:state.manikins,dimensions:state.dimensions,landBoundary:state.landBoundary};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='間取り_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
});
document.getElementById('loadBtn').addEventListener('click',()=>document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change',e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{
        try {
            const d=JSON.parse(ev.target.result);
            state.rooms=d.rooms||[]; state.groups=d.groups||[]; state.walls=d.walls||[];
            state.doors=d.doors||[]; state.windows=d.windows||[]; state.manikins=d.manikins||[];
            state.dimensions=d.dimensions||[]; state.landBoundary=d.landBoundary||null;
            state.selectedItem=null;
            detectAllOverlaps(); updateOverlapBadge(); draw(); alert('読み込み完了！');
        } catch { alert('読み込み失敗'); }
    };
    r.readAsText(f);
});

document.getElementById('exportBtn').addEventListener('click',()=>{
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    if(state.landBoundary){minX=Math.min(minX,state.landBoundary.x);minY=Math.min(minY,state.landBoundary.y);maxX=Math.max(maxX,state.landBoundary.x+state.landBoundary.width);maxY=Math.max(maxY,state.landBoundary.y+state.landBoundary.height);}
    state.rooms.forEach(r=>r.vertices.forEach(v=>{minX=Math.min(minX,v.x);minY=Math.min(minY,v.y);maxX=Math.max(maxX,v.x);maxY=Math.max(maxY,v.y);}));
    state.walls.forEach(w=>{minX=Math.min(minX,w.x1,w.x2);minY=Math.min(minY,w.y1,w.y2);maxX=Math.max(maxX,w.x1,w.x2);maxY=Math.max(maxY,w.y1,w.y2);});
    if(minX===Infinity){alert('何も描画されていません');return;}
    const margin=50;
    const eb={x:minX-margin,y:minY-margin,width:(maxX-minX)+margin*2,height:(maxY-minY)+margin*2};
    const tc=document.createElement('canvas');
    tc.width=eb.width; tc.height=eb.height;
    const tx=tc.getContext('2d');
    tx.fillStyle='white'; tx.fillRect(0,0,tc.width,tc.height);
    tx.save(); tx.translate(-eb.x,-eb.y);
    state.rooms.forEach(r=>{
        tx.fillStyle=r.color||'#e3f2fd';
        tx.beginPath(); tx.moveTo(r.vertices[0].x,r.vertices[0].y);
        for(let i=1;i<r.vertices.length;i++) tx.lineTo(r.vertices[i].x,r.vertices[i].y);
        tx.closePath(); tx.fill();
        tx.strokeStyle='#666'; tx.lineWidth=1; tx.stroke();
        const c=getPolygonCenter(r.vertices);
        tx.fillStyle='#333'; tx.font='bold 16px sans-serif'; tx.textAlign='center';
        tx.fillText(r.name||'部屋',c.x,c.y-15);
        tx.font='14px sans-serif'; tx.fillText(calculateTatamiFromArea(calculatePolygonArea(r.vertices))+'畳',c.x,c.y+5);
        if(r.purpose){tx.font='12px sans-serif';tx.fillStyle='#666';tx.fillText(r.purpose,c.x,c.y+22);}
    });
    tx.restore();
    const a=document.createElement('a'); a.download='間取り_'+new Date().toISOString().slice(0,10)+'.png';
    a.href=tc.toDataURL(); a.click();
});

document.getElementById('setLandBtn').addEventListener('click',()=>{
    const w=parseFloat(document.getElementById('landWidth').value);
    const d=parseFloat(document.getElementById('landDepth').value);
    if(w&&d&&w>0&&d>0){state.landBoundary={x:50,y:50,width:w*state.scale,height:d*state.scale};saveHistory();draw();}
    else alert('正しい数値を入力してください');
});
document.getElementById('clearLandBtn').addEventListener('click',()=>{state.landBoundary=null;saveHistory();draw();});
document.getElementById('clearBtn').addEventListener('click',()=>{
    if(confirm('すべて削除しますか?')){
        state.rooms=[];state.groups=[];state.walls=[];state.doors=[];state.windows=[];state.manikins=[];state.dimensions=[];
        state.selectedItem=null; state.overlappingPairs=[];
        saveHistory(); updateOverlapBadge(); draw();
    }
});

// ===== グループ機能 =====
function handleGroup(){
    if(state.multiSelectedRooms.length<2){alert('2つ以上選択してください');return;}
    state.groups=state.groups.filter(g=>!g.roomIds.some(id=>state.multiSelectedRooms.includes(id)));
    const ng={id:Date.now(),roomIds:[...state.multiSelectedRooms],name:'グループ'+(state.groups.length+1)};
    state.groups.push(ng); state.multiSelectedRooms=[...ng.roomIds];
    saveHistory(); draw(); alert(`${ng.name}を作成しました`);
}
function handleUngroup(){
    const tg=state.groups.filter(g=>g.roomIds.some(id=>state.multiSelectedRooms.includes(id)));
    if(tg.length===0){alert('選択中の部屋はグループに属していません');return;}
    const all=[]; tg.forEach(g=>all.push(...g.roomIds));
    state.groups=state.groups.filter(g=>!tg.includes(g));
    state.multiSelectedRooms=[...new Set(all)]; saveHistory(); draw(); alert('グループを解除しました');
}
function selectGroupIfExists(roomId){
    const g=state.groups.find(g=>g.roomIds.includes(roomId));
    if(g){
        state.multiSelectedRooms=[...g.roomIds]; state.selectedTool='multi-select';
        document.querySelectorAll('.tool-btn[data-tool]').forEach(b=>b.classList.remove('active'));
        document.querySelector('.tool-btn[data-tool="multi-select"]').classList.add('active');
        return true;
    }
    return false;
}
function handleUnion(){
    if(state.multiSelectedRooms.length<2){alert('2つ以上選択してください');return;}
    const sr=state.rooms.filter(r=>state.multiSelectedRooms.includes(r.id));
    const nr=unionPolygons(sr);
    if(nr){
        state.rooms=state.rooms.filter(r=>!state.multiSelectedRooms.includes(r.id));
        state.dimensions=state.dimensions.filter(d=>!state.multiSelectedRooms.includes(d.roomId));
        state.rooms.push(nr); state.multiSelectedRooms=[]; state.selectedItem=nr;
        detectAllOverlaps(); updateOverlapBadge(); saveHistory(); draw();
    }
}
function handleSubtract(){
    if(state.multiSelectedRooms.length<2){alert('2つ以上選択してください');return;}
    const br=state.rooms.find(r=>r.id===state.multiSelectedRooms[0]);
    const sr=state.rooms.filter(r=>state.multiSelectedRooms.slice(1).includes(r.id));
    const result=subtractPolygons(br,sr);
    if(result){
        state.rooms=state.rooms.filter(r=>!state.multiSelectedRooms.includes(r.id));
        state.dimensions=state.dimensions.filter(d=>!state.multiSelectedRooms.includes(d.roomId));
        state.rooms.push(result); state.multiSelectedRooms=[]; state.selectedItem=result;
        detectAllOverlaps(); updateOverlapBadge(); saveHistory(); draw();
    }
}

document.getElementById('unionBtnQuick').addEventListener('click',handleUnion);
document.getElementById('subtractBtnQuick').addEventListener('click',handleSubtract);
document.getElementById('clearSelectionBtnQuick').addEventListener('click',()=>{state.multiSelectedRooms=[];draw();});
document.getElementById('rotateMultiBtn').addEventListener('click',()=>document.getElementById('rotateBtn').click());
document.getElementById('groupBtnQuick').addEventListener('click',handleGroup);
document.getElementById('ungroupBtnQuick').addEventListener('click',handleUngroup);

// ===== タッチ操作 =====
let lastTouchEnd=0,lastDistance=0;
canvas.addEventListener('touchstart',e=>{
    if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;lastDistance=Math.sqrt(dx*dx+dy*dy);}
    else if(e.touches.length===1){
        e.preventDefault();
        const touch=e.touches[0],rect=canvas.getBoundingClientRect();
        const x=((touch.clientX-rect.left)-state.panOffset.x)/state.zoomLevel;
        const y=((touch.clientY-rect.top)-state.panOffset.y)/state.zoomLevel;
        const f=findItemAt(x,y);
        if(!f&&state.selectedTool==='select'){state.isPanning=true;state.dragStart={x:touch.clientX,y:touch.clientY};}
        else{canvas.dispatchEvent(new MouseEvent('mousedown',{clientX:touch.clientX,clientY:touch.clientY,bubbles:true}));}
    }
},{passive:false});
canvas.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length===2){
        const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(lastDistance>0) state.zoomLevel=Math.max(0.3,Math.min(3.0,state.zoomLevel+(dist-lastDistance)*0.01));
        lastDistance=dist; draw();
    } else if(e.touches.length===1){
        const touch=e.touches[0];
        if(state.isPanning){state.panOffset.x+=touch.clientX-state.dragStart.x;state.panOffset.y+=touch.clientY-state.dragStart.y;state.dragStart={x:touch.clientX,y:touch.clientY};draw();}
        else canvas.dispatchEvent(new MouseEvent('mousemove',{clientX:touch.clientX,clientY:touch.clientY,bubbles:true}));
    }
},{passive:false});
canvas.addEventListener('touchend',e=>{
    e.preventDefault();
    const now=Date.now();
    if(now-lastTouchEnd<=300){state.zoomLevel=1.0;draw();}
    lastTouchEnd=now;
    canvas.dispatchEvent(new MouseEvent('mouseup',{bubbles:true}));
},{passive:false});

document.addEventListener('keydown',e=>{
    if(e.key==='Delete'&&state.selectedItem)document.getElementById('deleteBtn').click();
    else if(e.key==='r'&&(state.selectedItem||state.multiSelectedRooms.length>0))document.getElementById('rotateBtn').click();
    else if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo();}
    else if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redo();}
    else if(e.key==='Escape'){ state.fitMode=false; fitModePreview=null; document.getElementById('fitModeBtn').style.background='#e3f2fd'; document.getElementById('fitModeBtn').style.color='#1565c0'; document.getElementById('fitModeIndicator').style.display='none'; draw(); }
});

document.getElementById('undoBtn').addEventListener('click',undo);
document.getElementById('redoBtn').addEventListener('click',redo);
document.getElementById('furnitureCategory').addEventListener('change',e=>displayFurnitureList(e.target.value));
document.getElementById('addCustomFurniture').addEventListener('click',()=>{
    const name=prompt('家具名:','新しい家具'); if(!name) return;
    const width=parseFloat(prompt('幅 (cm):','100'));
    const depth=parseFloat(prompt('奥行き (cm):','60'));
    if(!width||!depth) return;
    const item={name,width,depth,color:'#e0e0e0',icon:'📦'};
    const cat=document.getElementById('furnitureCategory').value;
    furnitureLibrary[cat].push(item); displayFurnitureList(cat);
    addFurniture(cat,furnitureLibrary[cat].length-1);
});
